<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'sc-bluegray': '#A7A88A', // Sage (Highlights)
              'sc-taupe': '#DAA7A2',    // Dusty Rose (Borders/Accents)
              'sc-cream': '#F7F7F0',    // White (Background)
              'sc-slate': '#37391E',    // Olive Green (Dark Accent)
              'text-dark': '#7B6867',   // Taupe (Primary Text)
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F7F7F0; /* sc-cream */
        color: #7B6867; /* text-dark */
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .chart-wrapper {
        position: relative;
        width: 100%;
        height: 480px;
        min-height: 480px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(196, 196, 192, 0.3);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
        "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Cpu, TrendingUp, ShieldAlert, Briefcase, FileText, Headphones, 
            Zap, Scale, UserCheck, ExternalLink, Linkedin, MousePointer2, Settings, Factory, ShieldCheck,
            Network, BrainCircuit, Globe, Users, Microscope, Binary, Database, Layout
        } from 'lucide-react';
        import { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } from 'recharts';

        // --- Data ---
        const DATE_RANGE = "Mar 21 – Mar 27, 2026";
        const LINKEDIN_URL = "https://www.linkedin.com/in/nicolemdickens/";
        const REPORT_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/d978fcc9d2a5e947524ca75d5c54e7e6e81b5915/AI%20Weekly%20Pulse%2027MAR26.pdf";
        const AUDIO_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/af666ef3f6b9f4648520189f7c5826272cfe4408/OpenAI_kills_Sora_for_physical_AI.m4a";

        const KPIS = [
            { value: "$25 Billion", label: "Terafab project—a joint venture for total semiconductor sovereignty." },
            { value: "Orbital AI", label: "Project Suncatcher moves compute to space to bypass Earth's energy wall." },
            { value: "Sora Shutdown", label: "OpenAI kills video app to pivot resources toward physical AI and robotics." }
        ];

        const CHART_DATA = [
            { name: 'OpenAI', value: 10000, label: 'Megaround' },
            { name: 'Shield AI', value: 2000, label: 'Series G' },
            { name: 'CMT', value: 350, label: 'Growth' },
            { name: 'Harvey', value: 200, label: 'Legal Tech' },
            { name: 'eMed', value: 200, label: 'Health' },
            { name: 'Xona', value: 170, label: 'Satellite' },
            { name: 'Cents', value: 140, label: 'SaaS' },
            { name: 'Qualified Health', value: 125, label: 'Health AI' },
            { name: 'Dash0', value: 110, label: 'Observability' },
            { name: 'PDW', value: 110, label: 'Defense' },
        ];

        // --- Components ---

        const Header = () => (
            <header className="text-center mb-10 pt-8 animate-fadeIn">
                <h1 className="text-4xl md:text-5xl font-bold text-sc-slate mb-3 tracking-tight">
                    AI Pulse Weekly
                </h1>
                <p className="text-lg md:text-xl text-sc-bluegray font-bold uppercase tracking-widest">
                    {DATE_RANGE}
                </p>

                <div className="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                    {KPIS.map((kpi, index) => (
                        <div 
                            key={index} 
                            className={`bg-white/80 p-6 rounded-2xl border-2 shadow-sm hover:shadow-md transition-all duration-300 ${index % 2 === 0 ? 'border-sc-bluegray' : 'border-sc-slate'}`}
                        >
                            <p className={`text-3xl font-bold mb-2 ${index % 2 === 0 ? 'text-sc-bluegray' : 'text-sc-slate'}`}>{kpi.value}</p>
                            <p className="text-sm text-text-dark/80 leading-snug font-medium">{kpi.label}</p>
                        </div>
                    ))}
                </div>
                
                <div className="flex flex-wrap justify-center gap-4 mt-8">
                    <a href={REPORT_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <FileText size={20} />
                        Strategic Analysis
                    </a>
                    <a href={AUDIO_URL} target="_blank" rel="noopener noreferrer" className="bg-white text-sc-slate border-2 border-sc-slate hover:bg-sc-slate hover:text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <Headphones size={20} />
                        Audio Summary
                    </a>
                </div>
            </header>
        );

        const Navigation = ({ activeSection, setActiveSection }) => {
            const sections = [
                { id: 'technology', label: 'Technology', icon: Cpu },
                { id: 'investment', label: 'Investment', icon: TrendingUp },
                { id: 'policy', label: 'Policy', icon: ShieldAlert },
                { id: 'impact', label: 'Impact', icon: Briefcase },
            ];
            return (
                <nav className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-10 bg-white/60 p-2 rounded-2xl sm:rounded-full shadow-lg border border-sc-taupe/10 max-w-2xl mx-auto">
                    {sections.map((section) => {
                        const Icon = section.icon;
                        return (
                            <button
                                key={section.id}
                                onClick={() => setActiveSection(section.id)}
                                className={`flex items-center gap-2 py-2 px-6 rounded-xl sm:rounded-full text-sm sm:text-base font-bold transition-all duration-300 ${activeSection === section.id ? 'bg-sc-slate text-white shadow-md transform scale-105' : 'text-sc-slate hover:bg-sc-bluegray/10 hover:text-sc-bluegray'}`}
                            >
                                <Icon size={18} />
                                {section.label}
                            </button>
                        );
                    })}
                </nav>
            );
        };

        const InvestmentChartComp = () => (
            <div className="chart-wrapper bg-white/95 p-6 rounded-3xl border border-sc-taupe/20 shadow-sm">
                <ResponsiveContainer width="100%" height="100%">
                    <BarChart 
                        data={CHART_DATA} 
                        layout="vertical" 
                        margin={{ top: 20, right: 120, left: 140, bottom: 20 }}
                    >
                        <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#C4C4C0" strokeOpacity={0.2} />
                        <XAxis type="number" hide />
                        <YAxis 
                            dataKey="name" 
                            type="category" 
                            tick={{ fill: '#7B6867', fontSize: 11, fontWeight: 600 }} 
                            axisLine={false} 
                            tickLine={false} 
                            width={130} 
                        />
                        <Tooltip 
                            cursor={{ fill: '#A7A88A', opacity: 0.1 }}
                            contentStyle={{ 
                                backgroundColor: '#F7F7F0', 
                                border: '1px solid #37391E', 
                                borderRadius: '12px', 
                                fontSize: '13px'
                            }}
                            formatter={(value, name, props) => [`$${value >= 1000 ? (value/1000).toFixed(1) + 'B' : value + 'M'} (${props.payload.label})`, 'Deal Value']}
                        />
                        <Bar dataKey="value" radius={[0, 10, 10, 0]} barSize={28}>
                            {CHART_DATA.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={index === 0 ? '#37391E' : (index % 2 === 0 ? '#A7A88A' : '#DAA7A2')} />
                            ))}
                            <LabelList 
                                dataKey="value" 
                                position="right" 
                                formatter={(val) => `$${val >= 1000 ? (val/1000).toFixed(1) + 'B' : val + 'M'}`} 
                                style={{ fill: '#37391E', fontSize: 12, fontWeight: 800 }}
                                offset={12}
                            />
                        </Bar>
                    </BarChart>
                </ResponsiveContainer>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('technology');

            const sectionContent = useMemo(() => {
                switch (activeSection) {
                    case 'technology':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">Vertical Integration & Orbital Compute</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        The AI industry is shifting from cloud-based assistance to physical agency, driven by massive semiconductor fabs and space-based data centers.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Factory className="text-sc-bluegray" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">The Terafab Initiative</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            A $25B joint venture aiming for total semiconductor sovereignty, producing 1 terawatt of annual compute capacity through 2nm process technology.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Globe className="text-sc-slate" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">Project Suncatcher</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Google's pivot to orbital compute, deploying TPUs in sun-synchronous orbits to bypass Earth's energy grid and cooling constraints.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-bluegray/5 p-8 rounded-3xl border border-sc-bluegray/20 text-center">
                                    <h3 className="text-xl font-bold text-sc-slate mb-3">Audit Your Strategic Realignment</h3>
                                    <p className="text-text-dark/80 mb-6">
                                        The center of gravity has moved from the screen to the factory floor. Ensure your roadmap accounts for the rise of Physical AI.
                                    </p>
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-8 py-3 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-md">
                                        Launch Your AI Opportunity Sprint <MousePointer2 size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'investment':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">Infrastructure & Defense Concentration</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        Capital is consolidating around national security and deep-tech infrastructure, with institutional wealth bracing for massive capital expenditure.
                                    </p>
                                </div>
                                <InvestmentChartComp />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-bluegray shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">OpenAI's $10B Megaround</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Bringing total funding to $120B to sustain 900M weekly users and the massive cost of securing specialized silicon.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-taupe shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">Shield AI's $2B Raise</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Strategic acquisition of Aechelon Technology to dominate high-fidelity simulation and physics-based autonomous defense.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-slate text-white p-8 rounded-3xl mt-8 text-center shadow-lg">
                                    <h3 className="text-xl font-bold mb-3">Consult on Infrastructure & Sovereignty</h3>
                                    <p className="mb-6 opacity-90">Institutional capital is moving into the physical means of production. Align your strategy with the new infrastructure moat.</p>
                                    <a href={LINKEDIN_URL} target="_blank" className="bg-white text-sc-slate px-10 py-3 rounded-full font-bold hover:bg-sc-taupe hover:text-text-dark transition-all shadow-md">
                                        Deploy Your AI Insights Dashboard
                                    </a>
                                </div>
                            </div>
                        );
                    case 'policy':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">The "One Rulebook" Framework</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        The US is moving to centralize AI regulation, preempting state-level regimes to create a unified national standard for innovation.
                                    </p>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-bluegray/10 p-4 rounded-2xl shrink-0">
                                            <Scale className="text-sc-bluegray" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">National AI Legislative Framework</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                Signed March 20, this 'One Rulebook' aims to eliminate the patchwork of 50 state regimes, favoring federal preemption to maintain a global lead.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-slate/10 p-4 rounded-2xl shrink-0">
                                            <ShieldAlert className="text-sc-slate" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">The Mistral Cultural Levy</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                Europe counters with a 1.5% revenue-based levy on foreign AI providers to fund indigenous cultural and creative sovereignty.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center pt-6">
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-10 py-4 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-xl">
                                        Consult on Governance & Compliance <ShieldCheck size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'impact':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">The Sora Shutdown & Physical AI</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        OpenAI's abrupt exit from generative video signals a massive reallocation of compute toward world simulation and robotics.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Zap className="text-sc-bluegray mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Agentic Reallocation</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            The pivot from Sora to robotics proves that the highest value in AI is now in 'Agentic AI'—systems that can act independently in the physical world.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Microscope className="text-sc-slate mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Sustainability Mandate</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            New tools like 'Carbonlog' allow SMBs to track the environmental impact of AI usage, turning green compliance into a competitive advantage.
                                        </p>
                                    </div>
                                </div>
                                <div className="mt-8 glass-card p-10 rounded-3xl shadow-xl flex flex-col md:flex-row gap-8 items-center border-2 border-sc-bluegray/30">
                                    <div className="text-center md:text-left">
                                        <h3 className="font-bold text-2xl mb-3 text-sc-slate">Deploy Your AI Sustainability Dashboard</h3>
                                        <p className="text-text-dark/80 mb-6 max-w-xl">
                                            As data center energy demands skyrocket, corporate clients are demanding verifiable green metrics. Turn your sustainability audit into a win.
                                        </p>
                                        <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-10 rounded-full inline-flex items-center gap-2 transition-all shadow-lg">
                                            Consult on Fractional AI Leadership <ExternalLink size={18} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            }, [activeSection]);

            return (
                <div className="min-h-screen pb-20">
                    <div className="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <Header />
                        
                        <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl border border-sc-taupe/20 mb-10 max-w-5xl mx-auto">
                            <h3 className="text-2xl font-bold mb-6 text-center text-sc-slate">Executive Summary: The Great Reallocation</h3>
                            <div className="text-text-dark/90 leading-relaxed space-y-4 text-lg">
                                <p>
                                    The final week of March 2026 marks a definitive transition from generative hype to physical agency and orbital infrastructure. As terrestrial energy grids hit their limits, the industry is pivoting toward space-based compute and total vertical integration of the semiconductor supply chain.
                                </p>
                                <p>
                                    The sudden discontinuation of premier video tools like Sora signals a strategic reallocation of resources toward robotics and world simulation. For SMBs, this period demands technical diversification and a shift toward agentic tools that perform actual business operations rather than just generating media.
                                </p>
                                <p className="bg-sc-bluegray/10 p-6 rounded-xl font-semibold text-text-dark border-l-8 border-sc-slate italic shadow-inner">
                                    "The AI revolution has moved beyond the screen. The competitive advantage in 2026 belongs to those who can manage the intersection of silicon, energy, and physical agency—moving from pixels to physics."
                                </p>
                            </div>
                            <div className="mt-10 text-center">
                                <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="inline-block bg-sc-slate text-white font-bold px-10 py-4 rounded-full hover:bg-sc-bluegray transition-all shadow-lg text-lg">
                                    Build Your AI Strategy Roadmap
                                </a>
                            </div>
                        </div>

                        <Navigation activeSection={activeSection} setActiveSection={setActiveSection} />
                        
                        <main className="max-w-5xl mx-auto min-h-[500px]">
                            {sectionContent}
                        </main>
                    </div>

                    <footer className="text-center py-12 text-sc-slate text-sm mt-12 border-t border-sc-taupe/20 max-w-5xl mx-auto">
                        <p className="font-bold text-text-dark mb-2 text-xl">Nicole Dickens • Fractional AI Consultant</p>
                        <p className="mb-4 text-md opacity-80 italic">AI without a full-time hire — strategy, structure, and sanity included.</p>
                        <div className="flex justify-center gap-8 mt-6">
                            <a href={LINKEDIN_URL} target="_blank" className="text-sc-slate font-bold hover:text-text-dark transition-colors flex items-center gap-2 text-base">
                                <Linkedin size={20} /> LinkedIn Profile
                            </a>
                            <span className="text-sc-taupe/30">|</span>
                            <span className="text-text-dark/60 text-base">Powered by Gemini Deep Research</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
