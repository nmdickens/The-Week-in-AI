    <script type="importmap">

        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",

<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import {

            Zap, Scale, UserCheck, ExternalLink, Linkedin, MousePointer2, Settings, Factory, ShieldCheck,
            Network, BrainCircuit, Globe, Users, Microscope, Binary, Database, Layout
        } from 'lucide-react';
        import { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } from 'recharts';

        // --- Data ---
        const DATE_RANGE = "May 16 – May 22, 2026";
        const LINKEDIN_URL = "https://www.linkedin.com/in/nicolemdickens/";
        const REPORT_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/f1ec5e96fe09629c66b80d84ed67a59630dab649/AI%20Weekly%20Pulse%2022MAY26.pdf";
        const AUDIO_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/55b158259d911864c3962262dcacc0257ead7214/Sovereign_AI_Agents_Replace_Passive_Chatbots.m4a";

            { value: "84% Errors", label: "Bookkeeping errors historically made in manual payroll, now optimized via background reconciliation." }

            { name: 'Meta Platforms', value: 13000, label: 'Grid Infrastructure Debt' },
            { name: 'Cerebras Systems', value: 5550, label: 'Record Chip IPO' },
            { name: 'Anduril', value: 5000, label: 'Defense Tech Venture' },
            { name: 'Fervo Energy', value: 2000, label: 'Geothermal Energy IPO' },
        ];

        // --- Components ---

        const Header = () => (
            <header className="text-center mb-10 pt-8 animate-fadeIn">
                <h1 className="text-4xl md:text-5xl font-bold text-sc-slate mb-3 tracking-tight">
                    AI Pulse Weekly
                </h1>
                <p className="text-lg md:text-xl text-sc-bluegray font-bold uppercase tracking-widest">
                    {DATE_RANGE}
                </p>

                <div className="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                    {KPIS.map((kpi, index) => (
                        <div 
                            key={index} 
                            className={`bg-white/85 p-6 rounded-2xl border-2 shadow-sm hover:shadow-md transition-all duration-300 ${index % 2 === 0 ? 'border-sc-bluegray' : 'border-sc-slate'}`}
                        >
                            <p className={`text-3xl font-bold mb-2 ${index % 2 === 0 ? 'text-sc-bluegray' : 'text-sc-slate'}`}>{kpi.value}</p>
                            <p className="text-sm text-text-dark/80 leading-snug font-medium">{kpi.label}</p>
                        </div>
                    ))}
                </div>
                
                <div className="flex flex-wrap justify-center gap-4 mt-8">

                </div>
            </header>
        );

        const Navigation = ({ activeSection, setActiveSection }) => {
            const sections = [

                { id: 'investment', label: 'Investment', icon: TrendingUp },
                { id: 'policy', label: 'Policy', icon: ShieldAlert },
                { id: 'impact', label: 'Impact', icon: Briefcase },

                <nav className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-10 bg-white/60 p-2 rounded-2xl sm:rounded-full shadow-lg border border-sc-taupe/10 max-w-2xl mx-auto">

                        const Icon = section.icon;
                        return (
                            <button
                                key={section.id}
                                onClick={() => setActiveSection(section.id)}
                                className={`flex items-center gap-2 py-2 px-6 rounded-xl sm:rounded-full text-sm sm:text-base font-bold transition-all duration-300 ${activeSection === section.id ? 'bg-sc-slate text-white shadow-md transform scale-105' : 'text-sc-slate hover:bg-sc-bluegray/20 hover:text-sc-bluegray'}`}

            );
        };

        const InvestmentChartComp = () => (

                        layout="vertical"

                        <XAxis type="number" hide />
                        <YAxis 
                            dataKey="name" 
                            type="category" 
                            tick={{ fill: '#495420', fontSize: 11, fontWeight: 600 }} 
                            axisLine={false} 
                            tickLine={false} 
                            width={130} 
                        />
                        <Tooltip 
                            cursor={{ fill: '#A98AB0', opacity: 0.1 }}
                            contentStyle={{ 
                                backgroundColor: '#F7F7F0', 
                                border: '1px solid #495420', 
                                borderRadius: '12px', 
                                fontSize: '13px'
                            }}
                            formatter={(value, name, props) => [`$${value >= 1000 ? (value/1000).toFixed(2) + 'B' : value + 'M'} (${props.payload.label})`, 'Deal Value']}
                        />
                        <Bar dataKey="value" radius={[0, 10, 10, 0]} barSize={28}>
                            {CHART_DATA.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={index === 0 ? '#495420' : (index % 2 === 0 ? '#A98AB0' : '#C4C4C0')} />
                            ))}
                            <LabelList 
                                dataKey="value" 
                                position="right" 
                                formatter={(val) => `$${val >= 1000 ? (val/1000).toFixed(2) + 'B' : val + 'M'}`} 
                                style={{ fill: '#495420', fontSize: 12, fontWeight: 800 }}
                                offset={12}
                            />
                        </Bar>
                    </BarChart>
                </ResponsiveContainer>
            </div>
        );

                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Zap className="text-sc-bluegray" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">Gemini Omni World Modeling</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">

                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">

                                            <h3 className="text-xl font-bold text-sc-slate">Agent Payments Protocol (AP2)</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">

                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-bluegray/10 p-8 rounded-3xl border border-sc-bluegray/20 text-center">
                                    <h3 className="text-xl font-bold text-sc-slate mb-3">Identify Your High-ROI Use Cases</h3>
                                    <p className="text-text-dark/80 mb-6">
                                        Stop wasting resources on passive prompts. Map out autonomous workflows to cut operating costs and transition to a background digital labor model today.
                                    </p>
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-8 py-3 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-md">
                                        Launch Your AI Opportunity Sprint <MousePointer2 size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'investment':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">Physical Infrastructure Concentration</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        Capital is prioritizing physical hardware assets, clean energy generation, and defensive security measures over standard retail software.
                                    </p>
                                </div>
                                <InvestmentChartComp />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-bluegray shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">Gigawatt-Scale Clean Energy</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Meta secured a $13B debt financing package to build massive data infrastructure, while geothermal pioneers raised billions to guarantee grid power supplies.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-taupe shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">Runtime Agent Leak Defense</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Cyera acquired Genie Security to mitigate the severe endpoint vulnerabilities introduced when autonomous assistants require unsupervised local file database access.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-slate text-white p-8 rounded-3xl mt-8 text-center shadow-lg">
                                    <h3 className="text-xl font-bold mb-3">Track Your Autonomous Worker ROI</h3>
                                    <p className="mb-6 opacity-90">Avoid loose software leaks while measuring physical efficiency gains. Maintain visibility into your background tools with unified dashboards.</p>
                                    <a href={LINKEDIN_URL} target="_blank" className="bg-white text-sc-slate px-10 py-3 rounded-full font-bold hover:bg-sc-taupe hover:text-text-dark transition-all shadow-md">
                                        Deploy Your AI Insights Dashboard
                                    </a>
                                </div>
                            </div>

                    case 'policy':

                            <div className="space-y-6 animate-fadeIn">

                                <div className="space-y-6">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-bluegray/20 p-4 rounded-2xl shrink-0">
                                            <Scale className="text-sc-bluegray" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">Federal & State Policy Collision</h3>
                                            <p className="text-text-dark/70 leading-relaxed">

                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-slate/20 p-4 rounded-2xl shrink-0">
                                            <ShieldCheck className="text-sc-slate" size={40} />
                                        </div>
                                        <div>

                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">

                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        Routine execution-level work is being fully automated, reorganizing human labor into oversight, exception auditing, and strategic modeling.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Users className="text-sc-bluegray mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Labor Redistribution</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Entry-level billing and administration roles are actively transitioning to automated pipelines, requiring humans to pivot towards high-value exception verification.

                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Factory className="text-sc-slate mb-4" size={40} />

                                        <p className="text-text-dark/70 leading-relaxed">

                                        </p>
                                    </div>
                                </div>
                                
                                <div className="mt-8 glass-card p-10 rounded-3xl shadow-xl border-2 border-sc-bluegray/30 text-center">
                                    <div className="max-w-3xl mx-auto">
                                        <h3 className="font-bold text-2xl mb-3 text-sc-slate">Sovereign Fractional AI Leadership Consultation</h3>
                                        <p className="text-text-dark/80 mb-6 max-w-xl mx-auto">
                                            Establish clear bounds for your automated digital employees. Align compliance, data residency, and real-time auditability to safe operational practices without full-time placement costs.
                                        </p>
                                        <div className="flex justify-center">
                                            <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-10 rounded-full inline-flex items-center gap-2 transition-all shadow-lg">
                                                Consult on Fractional AI Leadership <ExternalLink size={18} />
                                            </a>
                                        </div>
                                    </div>
                                </div>
                            </div>

                    default:

            return (

                    <div className="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <Header />
                        
                        <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl border border-sc-taupe/20 mb-10 max-w-5xl mx-auto">

                                <p>

                                </p>
                                <p>
                                    For SMB owners, this transition lowers the technical barrier and overhead of process execution. Highly modular background agents can now be connected directly to target platforms to handle books, forecast cash positions risk-free, and automate continuous CRM operations in months.
                                </p>
                                <p className="bg-sc-bluegray/10 p-6 rounded-xl font-semibold text-text-dark border-l-8 border-sc-slate italic shadow-inner">
                                    "The era of active prompting is ending. The winners of 2026 are those who decouple growth from manual labor by hiring background autonomous agents under strict governance parameters."
                                </p>
                            </div>
                            <div className="mt-10 text-center">
                                <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="inline-block bg-sc-slate text-white font-bold px-10 py-4 rounded-full hover:bg-sc-bluegray transition-all shadow-lg text-lg">
                                    Build Your Sovereign Strategy Roadmap
                                </a>
                            </div>
                        </div>

                        <Navigation activeSection={activeSection} setActiveSection={setActiveSection} />
                        
                        <main className="max-w-5xl mx-auto min-h-[500px]">
                            {sectionContent}
                        </main>
                    </div>

                    <footer className="text-center py-12 text-sc-slate text-sm mt-12 border-t border-sc-taupe/20 max-w-5xl mx-auto">
                        <p className="font-bold text-text-dark mb-2 text-xl">Nicole Dickens • Fractional AI Consultant</p>
                        <p className="mb-4 text-md opacity-80 italic">AI without a full-time hire — strategy, structure, and sanity included.</p>
                        <div className="flex justify-center gap-8 mt-6">
                            <a href={LINKEDIN_URL} target="_blank" className="text-sc-slate font-bold hover:text-text-dark transition-colors flex items-center gap-2 text-base">
                                <Linkedin size={20} /> LinkedIn Profile
                            </a>
                            <span className="text-sc-taupe/30">|</span>
                            <span className="text-text-dark/60 text-base">Powered by Gemini Deep Research</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
