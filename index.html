<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pulse Weekly: Feb 28 – Mar 06, 2026</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'sc-bluegray': '#A7A88A', // Sage
              'sc-taupe': '#DAA7A2',    // Dusty Rose
              'sc-cream': '#F7F7F0',    // White
              'sc-slate': '#37391E',    // Olive Green
              'text-dark': '#7B6867',   // Taupe
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #F7F7F0; /* sc-cream */
        color: #7B6867; /* text-dark */
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .chart-wrapper {
        position: relative;
        width: 100%;
        height: 480px;
        min-height: 480px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(138, 158, 160, 0.3);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
        "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Cpu, TrendingUp, ShieldAlert, Briefcase, FileText, Headphones, 
            Zap, Scale, UserCheck, ExternalLink, Linkedin, MousePointer2, Settings, Factory, ShieldCheck,
            Network, BrainCircuit, Globe, Users, Microscope, Binary
        } from 'lucide-react';
        import { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } from 'recharts';

        // --- Data ---
        const DATE_RANGE = "Feb 28 – Mar 06, 2026";
        const LINKEDIN_URL = "https://www.linkedin.com/in/nicolemdickens/";
        const REPORT_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/5ca9d2790d988656551ba9abed2d875c1b3dbe40/AI%20Weekly%20Pulse%2006MAR26.pdf";
        const AUDIO_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/5ca9d2790d988656551ba9abed2d875c1b3dbe40/Sovereign_compute_and_the_agentic_worker.m4a";

        const KPIS = [
            { value: "$189 Billion", label: "Global venture funding in February, a 780% increase year-over-year from 2025." },
            { value: "56% ROI Gap", label: "CEOs reporting AI investments have yet to yield measurable revenue gains or cost savings." },
            { value: "10x Cheaper", label: "Reduction in inference cost per token promised by NVIDIA’s Vera Rubin platform." }
        ];

        const CHART_DATA = [
            { name: 'OpenAI', value: 110000, label: 'Foundation Models' },
            { name: 'Anthropic', value: 30000, label: 'Foundation Models' },
            { name: 'Waymo', value: 16000, label: 'Autonomous Transport' },
            { name: 'Sierra Space', value: 550, label: 'AI Defense/Space' },
            { name: 'Ayar Labs', value: 500, label: 'AI Infrastructure' },
            { name: 'Science Corp', value: 230, label: 'Neurotech/BCI' },
        ];

        // --- Components ---

        const Header = () => (
            <header className="text-center mb-10 pt-8 animate-fadeIn">
                <h1 className="text-4xl md:text-5xl font-bold text-sc-slate mb-3 tracking-tight">
                    AI Pulse Weekly
                </h1>
                <p className="text-lg md:text-xl text-sc-taupe font-bold uppercase tracking-widest">
                    {DATE_RANGE}
                </p>

                <div className="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                    {KPIS.map((kpi, index) => (
                        <div 
                            key={index} 
                            className={`bg-white/80 p-6 rounded-2xl border-2 shadow-sm hover:shadow-md transition-all duration-300 ${index % 2 === 0 ? 'border-sc-bluegray' : 'border-sc-slate'}`}
                        >
                            <p className={`text-3xl font-bold mb-2 ${index % 2 === 0 ? 'text-sc-bluegray' : 'text-sc-slate'}`}>{kpi.value}</p>
                            <p className="text-sm text-text-dark/80 leading-snug font-medium">{kpi.label}</p>
                        </div>
                    ))}
                </div>
                
                <div className="flex flex-wrap justify-center gap-4 mt-8">
                    <a href={REPORT_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <FileText size={20} />
                        Strategic Analysis
                    </a>
                    <a href={AUDIO_URL} target="_blank" rel="noopener noreferrer" className="bg-white text-sc-slate border-2 border-sc-slate hover:bg-sc-slate hover:text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <Headphones size={20} />
                        Audio Summary
                    </a>
                </div>
            </header>
        );

        const Navigation = ({ activeSection, setActiveSection }) => {
            const sections = [
                { id: 'technology', label: 'Technology', icon: Cpu },
                { id: 'investment', label: 'Investment', icon: TrendingUp },
                { id: 'policy', label: 'Policy', icon: ShieldAlert },
                { id: 'impact', label: 'Impact', icon: Briefcase },
            ];
            return (
                <nav className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-10 bg-white/60 p-2 rounded-2xl sm:rounded-full shadow-lg border border-sc-taupe/10 max-w-2xl mx-auto">
                    {sections.map((section) => {
                        const Icon = section.icon;
                        return (
                            <button
                                key={section.id}
                                onClick={() => setActiveSection(section.id)}
                                className={`flex items-center gap-2 py-2 px-6 rounded-xl sm:rounded-full text-sm sm:text-base font-bold transition-all duration-300 ${activeSection === section.id ? 'bg-sc-slate text-white shadow-md transform scale-105' : 'text-sc-slate hover:bg-sc-bluegray/10 hover:text-sc-bluegray'}`}
                            >
                                <Icon size={18} />
                                {section.label}
                            </button>
                        );
                    })}
                </nav>
            );
        };

        const InvestmentChartComp = () => (
            <div className="chart-wrapper bg-white/95 p-6 rounded-3xl border border-sc-taupe/20 shadow-sm">
                <ResponsiveContainer width="100%" height="100%">
                    <BarChart 
                        data={CHART_DATA} 
                        layout="vertical" 
                        margin={{ top: 20, right: 120, left: 140, bottom: 20 }}
                    >
                        <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#B5B2B0" strokeOpacity={0.2} />
                        <XAxis type="number" hide />
                        <YAxis 
                            dataKey="name" 
                            type="category" 
                            tick={{ fill: '#3C3C3D', fontSize: 11, fontWeight: 600 }} 
                            axisLine={false} 
                            tickLine={false} 
                            width={130} 
                        />
                        <Tooltip 
                            cursor={{ fill: '#A7A88A', opacity: 0.1 }}
                            contentStyle={{ 
                                backgroundColor: '#F7F7F0', 
                                border: '1px solid #37391E', 
                                borderRadius: '12px', 
                                fontSize: '13px'
                            }}
                            formatter={(value, name, props) => [`$${value >= 1000 ? (value/1000).toFixed(1) + 'B' : value + 'M'} (${props.payload.label})`, 'Deal Value']}
                        />
                        <Bar dataKey="value" radius={[0, 10, 10, 0]} barSize={28}>
                            {CHART_DATA.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={index === 0 ? '#37391E' : (index % 2 === 0 ? '#A7A88A' : '#DAA7A2')} />
                            ))}
                            <LabelList 
                                dataKey="value" 
                                position="right" 
                                formatter={(val) => `$${val >= 1000 ? (val/1000).toFixed(1) + 'B' : val + 'M'}`} 
                                style={{ fill: '#3C3C3D', fontSize: 12, fontWeight: 800 }}
                                offset={12}
                            />
                        </Bar>
                    </BarChart>
                </ResponsiveContainer>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('technology');

            const sectionContent = useMemo(() => {
                switch (activeSection) {
                    case 'technology':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">Extreme Codesign & Physical AI</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        The simultaneous engineering of hardware and software is maximizing 'Inference per Watt,' pushing AI from the cloud into the physical world.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Cpu className="text-sc-bluegray" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">NVIDIA Vera Rubin</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            The launch of the Rubin platform marks a 10x reduction in inference costs, a critical catalyst for the mainstream adoption of reasoning-heavy agentic AI.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Factory className="text-sc-slate" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">AI-Driven Factories</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Samsung and Hyundai's 'ChatGPT moment for robotics' involves agentic systems managing entire supply chains and physical operations without human intervention.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-bluegray/5 p-8 rounded-3xl border border-sc-bluegray/20 text-center">
                                    <h3 className="text-xl font-bold text-sc-slate mb-3">Bridge the Value-Realization Gap</h3>
                                    <p className="text-text-dark/80 mb-6">
                                        Success in 2026 requires moving from experimentation to production deployment. Audit your internal processes to ensure agentic autonomy isn't impeded by 'broken' workflows.
                                    </p>
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-8 py-3 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-md">
                                        Launch Your AI Opportunity Sprint <MousePointer2 size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'investment':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">Capital Concentration & Sovereign Wealth</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        A record $189B month is characterized by extreme concentration, with 83% of capital captured by just three vertically integrated giants.
                                    </p>
                                </div>
                                <InvestmentChartComp />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-bluegray shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">The Infrastructure Pivot</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Strategic investment is shifting heavily toward the infrastructure layer, with hundreds of millions flowing into Ayar Labs to solve data movement bottlenecks.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-taupe shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">Sovereign Compute Hubs</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Middle Eastern funds are deploying tens of billions to build massive data center clusters (Project Stargate), vying to become global hubs for compute.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-slate text-white p-8 rounded-3xl mt-8 text-center shadow-lg">
                                    <h3 className="text-xl font-bold mb-3">Audit Your Vertical AI Strategy</h3>
                                    <p className="mb-6 opacity-90">Future returns depend on the successful 'productionalization' of AI across high-stakes industries like healthcare and banking.</p>
                                    <a href={LINKEDIN_URL} target="_blank" className="bg-white text-sc-slate px-10 py-3 rounded-full font-bold hover:bg-sc-taupe hover:text-text-dark transition-all shadow-md">
                                        Build Your AI Strategy Roadmap
                                    </a>
                                </div>
                            </div>
                        );
                    case 'policy':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">The Sovereign Fracture</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        National security interests are colliding with the safety philosophies of private AI labs, creating a patchwork of incompatible frameworks.
                                    </p>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-bluegray/10 p-4 rounded-2xl shrink-0">
                                            <ShieldAlert className="text-sc-bluegray" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">Anthropic Gov Ban</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                The Pentagon's designation of Anthropic as a 'supply chain risk' signals that the military will no longer tolerate private vendors exercising veto power over operational command.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-slate/10 p-4 rounded-2xl shrink-0">
                                            <Scale className="text-sc-slate" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">EU AI Act Enforcement</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                While the U.S. prioritizes 'Innovation First,' the EU is entering the enforcement phase of the AI Act, mandating strict conformity assessments for high-risk systems.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center pt-6">
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-10 py-4 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-xl">
                                        Secure Your Fractional AI Leadership <ShieldCheck size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'impact':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">The Experience Premium</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        AI is functioning as a complement to experienced professionals while substituting for codifiable tasks typically handled by junior staff.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Users className="text-sc-bluegray mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Labor Market Stability</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Aggregate unemployment remains stable, but a significant 'experience premium' has emerged, widening the gap between entry-level workers and those with deep tacit knowledge.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <ShieldCheck className="text-sc-slate mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">The Fiduciary Risk</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            The end of the 'black box defense' means courts and regulators now hold boards accountable for the governance and outcomes of autonomous decision-making systems.
                                        </p>
                                    </div>
                                </div>
                                <div className="mt-8 glass-card p-10 rounded-3xl shadow-xl flex flex-col md:flex-row gap-8 items-center border-2 border-sc-bluegray/30">
                                    <div className="text-center md:text-left">
                                        <h3 className="font-bold text-2xl mb-3 text-sc-slate">Deploy Your AI Insights Dashboard</h3>
                                        <p className="text-text-dark/80 mb-6 max-w-xl">
                                            As professional expertise reaches near-zero cost, your primary differentiator becomes emotional intelligence and strategic oversight. Orchestrate your digital workforce with senior-grade leadership.
                                        </p>
                                        <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-10 rounded-full inline-flex items-center gap-2 transition-all shadow-lg">
                                            Consult on Fractional AI Leadership <ExternalLink size={18} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            }, [activeSection]);

            return (
                <div className="min-h-screen pb-20">
                    <div className="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <Header />
                        
                        <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl border border-sc-taupe/20 mb-10 max-w-5xl mx-auto">
                            <h3 className="text-2xl font-bold mb-6 text-center text-sc-slate">Executive Summary: The Sovereign Compute Era</h3>
                            <div className="text-text-dark/90 leading-relaxed space-y-4 text-lg">
                                <p>
                                    The week of February 28 to March 6, 2026, marks a definitive shift as the AI industry moves from speculative experimentation toward hardened sovereign infrastructure. A profound restructuring of the relationship between private labs and state power has emerged, highlighted by the U.S. government’s regulatory actions against domestic leaders.
                                </p>
                                <p>
                                    This era is defined by the rise of 'sovereign compute,' where the primary value resides in the autonomous management of physical and digital systems. Success now depends on navigating the complex intersection of state power and private innovation, as enterprises prepare for a future where compute is a sovereign asset and agents are primary workers.
                                </p>
                                <p className="bg-sc-bluegray/10 p-6 rounded-xl font-semibold text-text-dark border-l-8 border-sc-slate italic shadow-inner">
                                    "Strategic dominance is no longer defined by workforce size. Success requires the seamless integration of autonomous agents into deeply audited business processes. Those who fail to bridge the 'ROI Reckoning' risk operational obsolescence."
                                </p>
                            </div>
                            <div className="mt-10 text-center">
                                <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="inline-block bg-sc-slate text-white font-bold px-10 py-4 rounded-full hover:bg-sc-bluegray transition-all shadow-lg text-lg">
                                    Launch Your AI Opportunity Sprint
                                </a>
                            </div>
                        </div>

                        <Navigation activeSection={activeSection} setActiveSection={setActiveSection} />
                        
                        <main className="max-w-5xl mx-auto min-h-[500px]">
                            {sectionContent}
                        </main>
                    </div>

                    <footer className="text-center py-12 text-sc-slate text-sm mt-12 border-t border-sc-taupe/20 max-w-5xl mx-auto">
                        <p className="font-bold text-text-dark mb-2 text-xl">Nicole Dickens • Fractional AI Consultant</p>
                        <p className="mb-4 text-md opacity-80 italic">AI without a full-time hire — strategy, structure, and sanity included.</p>
                        <div className="flex justify-center gap-8 mt-6">
                            <a href={LINKEDIN_URL} target="_blank" className="text-sc-slate font-bold hover:text-text-dark transition-colors flex items-center gap-2 text-base">
                                <Linkedin size={20} /> LinkedIn Profile
                            </a>
                            <span className="text-sc-taupe/30">|</span>
                            <span className="text-text-dark/60 text-base">Powered by Gemini Deep Research</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
