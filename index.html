<!DOCTYPE html>

    <!-- Tailwind CSS -->

    <!-- Fonts -->

      tailwind.config = {

    <style>
      body {
        background-color: #F7F7F0; /* sc-cream */
        color: #495420; /* text-dark */

        overflow-x: hidden;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fadeIn {
        animation: fadeIn 0.4s ease-out forwards;
      }
      .chart-wrapper {
        position: relative;
        width: 100%;
        height: 480px;
        min-height: 480px;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(196, 196, 192, 0.3);
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.3.1",
        "react-dom": "https://esm.sh/react-dom@18.3.1",
        "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
        "lucide-react": "https://esm.sh/lucide-react@0.460.0?external=react",
        "recharts": "https://esm.sh/recharts@2.13.3?external=react,react-dom"
      }
    }
    </script>
<link rel="stylesheet" href="/index.css">
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            Cpu, TrendingUp, ShieldAlert, Briefcase, FileText, Headphones, 
            Zap, Scale, UserCheck, ExternalLink, Linkedin, MousePointer2, Settings, Factory, ShieldCheck,
            Network, BrainCircuit, Globe, Users, Microscope, Binary, Database, Layout
        } from 'lucide-react';
        import { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, 
            ResponsiveContainer, Cell, LabelList 
        } from 'recharts';

        // --- Data ---
        const DATE_RANGE = "Apr 25 – May 1, 2026";
        const LINKEDIN_URL = "https://www.linkedin.com/in/nicolemdickens/";
        const REPORT_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/abff0c962e4e9661137152afe925debcb610033b/AI%20Weekly%20Pulse%2001MAY26.pdf";
        const AUDIO_URL = "https://rawcdn.githack.com/nmdickens/The-Week-in-AI/abff0c962e4e9661137152afe925debcb610033b/The_violent_birth_of_the_agentic_era.m4a";

        const KPIS = [
            { value: "$300 Billion", label: "Q1 2026 global venture investment, with 80% flowing solely into AI infrastructure." },
            { value: "10 Trillion", label: "Parameters for Claude Mythos, a model so powerful it is gated by Project Glasswing." },
            { value: "$2B Veto", label: "China's block on Meta's acquisition of Manus signals new 'intelligence protectionism'." }
        ];

        const CHART_DATA = [
            { name: 'OpenAI', value: 122000, label: 'Capital Concentration' },
            { name: 'xAI/SpaceX', value: 75000, label: 'Record Raise Goal' },
            { name: 'Nebius/Eigen AI', value: 643, label: 'Inference Opt.' },
            { name: 'Cognizant', value: 600, label: 'DC Operations' },
            { name: 'True Anomaly', value: 600, label: 'Defense Tech' },
            { name: 'Rogo', value: 160, label: 'Vertical AI' },
        ];

        // --- Components ---

        const Header = () => (
            <header className="text-center mb-10 pt-8 animate-fadeIn">
                <h1 className="text-4xl md:text-5xl font-bold text-sc-slate mb-3 tracking-tight">
                    AI Pulse Weekly
                </h1>
                <p className="text-lg md:text-xl text-sc-bluegray font-bold uppercase tracking-widest">
                    {DATE_RANGE}
                </p>

                <div className="mt-8 grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                    {KPIS.map((kpi, index) => (
                        <div 
                            key={index} 
                            className={`bg-white/80 p-6 rounded-2xl border-2 shadow-sm hover:shadow-md transition-all duration-300 ${index % 2 === 0 ? 'border-sc-bluegray' : 'border-sc-slate'}`}
                        >
                            <p className={`text-3xl font-bold mb-2 ${index % 2 === 0 ? 'text-sc-bluegray' : 'text-sc-slate'}`}>{kpi.value}</p>
                            <p className="text-sm text-text-dark/80 leading-snug font-medium">{kpi.label}</p>
                        </div>
                    ))}
                </div>
                
                <div className="flex flex-wrap justify-center gap-4 mt-8">
                    <a href={REPORT_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <FileText size={20} />
                        Strategic Analysis
                    </a>
                    <a href={AUDIO_URL} target="_blank" rel="noopener noreferrer" className="bg-white text-sc-slate border-2 border-sc-slate hover:bg-sc-slate hover:text-white font-bold py-3 px-8 rounded-full transition-all duration-300 shadow-md hover:shadow-lg text-sm sm:text-base flex items-center gap-2">
                        <Headphones size={20} />
                        Audio Summary
                    </a>
                </div>
            </header>
        );

        const Navigation = ({ activeSection, setActiveSection }) => {
            const sections = [
                { id: 'technology', label: 'Technology', icon: Cpu },
                { id: 'investment', label: 'Investment', icon: TrendingUp },
                { id: 'policy', label: 'Policy', icon: ShieldAlert },
                { id: 'impact', label: 'Impact', icon: Briefcase },
            ];
            return (
                <nav className="flex flex-wrap justify-center gap-2 sm:gap-4 mb-10 bg-white/60 p-2 rounded-2xl sm:rounded-full shadow-lg border border-sc-taupe/10 max-w-2xl mx-auto">
                    {sections.map((section) => {
                        const Icon = section.icon;
                        return (
                            <button
                                key={section.id}
                                onClick={() => setActiveSection(section.id)}
                                className={`flex items-center gap-2 py-2 px-6 rounded-xl sm:rounded-full text-sm sm:text-base font-bold transition-all duration-300 ${activeSection === section.id ? 'bg-sc-slate text-white shadow-md transform scale-105' : 'text-sc-slate hover:bg-sc-bluegray/10 hover:text-sc-bluegray'}`}
                            >
                                <Icon size={18} />
                                {section.label}
                            </button>
                        );
                    })}
                </nav>
            );
        };

        const InvestmentChartComp = () => (
            <div className="chart-wrapper bg-white/95 p-6 rounded-3xl border border-sc-taupe/20 shadow-sm">
                <ResponsiveContainer width="100%" height="100%">
                    <BarChart 
                        data={CHART_DATA} 
                        layout="vertical" 
                        margin={{ top: 20, right: 120, left: 140, bottom: 20 }}
                    >
                        <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} stroke="#C4C4C0" strokeOpacity={0.2} />
                        <XAxis type="number" hide />
                        <YAxis 
                            dataKey="name" 
                            type="category" 
                            tick={{ fill: '#495420', fontSize: 11, fontWeight: 600 }} 
                            axisLine={false} 
                            tickLine={false} 
                            width={130} 
                        />
                        <Tooltip 
                            cursor={{ fill: '#A98AB0', opacity: 0.1 }}
                            contentStyle={{ 
                                backgroundColor: '#F7F7F0', 
                                border: '1px solid #495420', 
                                borderRadius: '12px', 
                                fontSize: '13px'
                            }}
                            formatter={(value, name, props) => [`$${value >= 1000 ? (value/1000).toFixed(1) + 'B' : value + 'M'} (${props.payload.label})`, 'Deal Value']}
                        />
                        <Bar dataKey="value" radius={[0, 10, 10, 0]} barSize={28}>
                            {CHART_DATA.map((entry, index) => (
                                <Cell key={`cell-${index}`} fill={index === 0 ? '#495420' : (index % 2 === 0 ? '#A98AB0' : '#C4C4C0')} />
                            ))}
                            <LabelList 
                                dataKey="value" 
                                position="right" 
                                formatter={(val) => `$${val >= 1000 ? (val/1000).toFixed(1) + 'B' : val + 'M'}`} 
                                style={{ fill: '#495420', fontSize: 12, fontWeight: 800 }}
                                offset={12}
                            />
                        </Bar>
                    </BarChart>
                </ResponsiveContainer>
            </div>
        );

        const App = () => {
            const [activeSection, setActiveSection] = useState('technology');

            const sectionContent = useMemo(() => {
                switch (activeSection) {
                    case 'technology':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">1-Bit Reasoning & Mythos Threshold</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        The emergence of 1-bit LLMs addresses energy costs, while the Mythos class signals a step change in cybersecurity and autonomous agency.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <Cpu className="text-sc-bluegray" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">1-Bit Local Models</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Radically compressed weights reduce memory footprint by 100x, allowing advanced AI to run locally on industrial IoT sensors and smartphones.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl border border-sc-taupe/20 shadow-sm hover:shadow-md transition-all">
                                        <div className="flex items-center gap-3 mb-4">
                                            <ShieldCheck className="text-sc-slate" size={32} />
                                            <h3 className="text-xl font-bold text-sc-slate">The Mythos Threshold</h3>
                                        </div>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Claude Mythos identified human-invisible zero-day flaws dating back 27 years, forcing a restricted release via the Glasswing firewall.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-bluegray/5 p-8 rounded-3xl border border-sc-bluegray/20 text-center">
                                    <h3 className="text-xl font-bold text-sc-slate mb-3">Transition to an Agentic Workforce</h3>
                                    <p className="text-text-dark/80 mb-6">
                                        The intelligence layer is successfully industrialized. Move your organization from assistant prompts to operational autonomy.
                                    </p>
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-8 py-3 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-md">
                                        Launch Your AI Opportunity Sprint <MousePointer2 size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'investment':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">Capital Concentration & Inference Opt.</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        Venture flows are decoupling from the broader market, focusing on foundational compute, sovereign data centers, and inference efficiency.
                                    </p>
                                </div>
                                <InvestmentChartComp />
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-bluegray shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">The $1.75T Valuation Race</h4>
                                        <p className="text-sm text-text-dark/70">
                                            OpenAI and xAI/SpaceX target historic public offerings as foundation models become treated as primary global utility infrastructure.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-6 rounded-2xl border-l-8 border-sc-taupe shadow-sm">
                                        <h4 className="font-bold text-lg text-sc-slate mb-2">The Inference Prize</h4>
                                        <p className="text-sm text-text-dark/70">
                                            Nebius acquires Eigen AI to optimize token-throughput. Inference now accounts for two-thirds of all global compute demand in 2026.
                                        </p>
                                    </div>
                                </div>
                                <div className="bg-sc-slate text-white p-8 rounded-3xl mt-8 text-center shadow-lg">
                                    <h3 className="text-xl font-bold mb-3">Master the Industrialized ROI</h3>
                                    <p className="mb-6 opacity-90">Micro-businesses are achieving scale previously reserved for global corporations. Track your adoption ROI with predictive dashboards.</p>
                                    <a href={LINKEDIN_URL} target="_blank" className="bg-white text-sc-slate px-10 py-3 rounded-full font-bold hover:bg-sc-taupe hover:text-text-dark transition-all shadow-md">
                                        Deploy Your AI Insights Dashboard
                                    </a>
                                </div>
                            </div>
                        );
                    case 'policy':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-bluegray decoration-4 underline-offset-8">Intelligence Protectionism</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        Nations move to treat AI agents as critical national infrastructure, intervening in cross-border acquisitions to protect strategic assets.
                                    </p>
                                </div>
                                <div className="space-y-6">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-bluegray/10 p-4 rounded-2xl shrink-0">
                                            <Scale className="text-sc-bluegray" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">The NDRC Veto</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                China's block on Meta's $2B acquisition of Manus signals that intelligence is no longer software, but a sovereign resource to be defended.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-sm border border-sc-taupe/20 flex flex-col md:flex-row gap-6 items-start">
                                        <div className="bg-sc-slate/10 p-4 rounded-2xl shrink-0">
                                            <ShieldAlert className="text-sc-slate" size={40} />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-sc-slate mb-2">Privilege Waiver Rulings</h3>
                                            <p className="text-text-dark/70 leading-relaxed">
                                                Federal courts establish that AI chatbot logs are not protected by attorney-client privilege, demanding new standards for corporate privacy.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                                <div className="text-center pt-6">
                                    <a href={LINKEDIN_URL} target="_blank" className="inline-flex items-center gap-2 bg-sc-slate text-white px-10 py-4 rounded-full font-bold hover:bg-sc-bluegray transition-all shadow-xl">
                                        Audit Your Compliance Readiness <ShieldCheck size={18} />
                                    </a>
                                </div>
                            </div>
                        );
                    case 'impact':
                        return (
                            <div className="space-y-6 animate-fadeIn">
                                <div className="text-center mb-8">
                                    <h2 className="text-3xl font-bold mb-4 text-sc-slate underline decoration-sc-taupe decoration-4 underline-offset-8">The Vibe Coding Era</h2>
                                    <p className="text-lg text-text-dark/80 max-w-3xl mx-auto leading-relaxed">
                                        As workers use personal agents to launch micro-enterprises, the market is polarizing toward automated convenience and premium human relationships.
                                    </p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Zap className="text-sc-bluegray mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Founder Surge</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            LinkedIn reported a 69% increase in "founders" as workers utilize autonomous agents to eliminate the overhead of traditional small-scale entrepreneurship.
                                        </p>
                                    </div>
                                    <div className="bg-white/85 p-8 rounded-3xl shadow-md border border-sc-bluegray/20">
                                        <Users className="text-sc-slate mb-4" size={40} />
                                        <h3 className="font-bold text-xl text-sc-slate mb-3">Critical Thinking Atrophy</h3>
                                        <p className="text-text-dark/70 leading-relaxed">
                                            Gartner warns that 50% of organizations will require "AI-free" competency evaluations by 2027 to combat the decline in junior talent reasoning.
                                        </p>
                                    </div>
                                </div>
                                <div className="mt-8 glass-card p-10 rounded-3xl shadow-xl flex flex-col md:flex-row gap-8 items-center border-2 border-sc-bluegray/30">
                                    <div className="text-center md:text-left">
                                        <h3 className="font-bold text-2xl mb-3 text-sc-slate">Establish Fractional AI Leadership</h3>
                                        <p className="text-text-dark/80 mb-6 max-w-xl">
                                            Survive the "Software-mageddon" and the shift to autonomous capacity. Gain strategy, structure, and sanity without a full-time hire.
                                        </p>
                                        <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="bg-sc-slate hover:bg-sc-bluegray text-white font-bold py-3 px-10 rounded-full inline-flex items-center gap-2 transition-all shadow-lg">
                                            Consult on Fractional AI Leadership <ExternalLink size={18} />
                                        </a>
                                    </div>
                                </div>
                            </div>
                        );
                    default:
                        return null;
                }
            }, [activeSection]);

            return (
                <div className="min-h-screen pb-20">
                    <div className="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
                        <Header />
                        
                        <div className="bg-white/95 p-6 md:p-10 rounded-3xl shadow-xl border border-sc-taupe/20 mb-10 max-w-5xl mx-auto">
                            <h3 className="text-2xl font-bold mb-6 text-center text-sc-slate">Executive Summary: The Silent Birth of the Agentic Era</h3>
                            <div className="text-text-dark/90 leading-relaxed space-y-4 text-lg">
                                <p>
                                    The week of May 1, 2026, marks the definitive transition from AI as a "chatbot" to AI as an "autonomous agent." With the Chinese NDRC's block on the Meta/Manus acquisition, intelligence has officially been designated as a sovereign resource to be protected and weaponized. 
                                </p>
                                <p>
                                    For SMBs, the "Software-mageddon" has arrived, as traditional SaaS models are hollowed out by autonomous workers that command higher margins and zero-day execution capacity. Success now depends on pivoting to a high-governance, agentic strategy that ensures your micro-team can punch with the weight of a global corporation.
                                </p>
                                <p className="bg-sc-bluegray/10 p-6 rounded-xl font-semibold text-text-dark border-l-8 border-sc-slate italic shadow-inner">
                                    "The Agentic Era is not born from a text box, but from intentionality. The winners of 2026 will not be those who prompt the best, but those who direct the most effective autonomous capacity while maintaining human-in-the-loop integrity."
                                </p>
                            </div>
                            <div className="mt-10 text-center">
                                <a href={LINKEDIN_URL} target="_blank" rel="noopener noreferrer" className="inline-block bg-sc-slate text-white font-bold px-10 py-4 rounded-full hover:bg-sc-bluegray transition-all shadow-lg text-lg">
                                    Consult on Your AI Strategy Roadmap
                                </a>
                            </div>
                        </div>

                        <Navigation activeSection={activeSection} setActiveSection={setActiveSection} />
                        
                        <main className="max-w-5xl mx-auto min-h-[500px]">
                            {sectionContent}
                        </main>
                    </div>

                    <footer className="text-center py-12 text-sc-slate text-sm mt-12 border-t border-sc-taupe/20 max-w-5xl mx-auto">
                        <p className="font-bold text-text-dark mb-2 text-xl">Nicole Dickens • Fractional AI Consultant</p>
                        <p className="mb-4 text-md opacity-80 italic">AI without a full-time hire — strategy, structure, and sanity included.</p>
                        <div className="flex justify-center gap-8 mt-6">
                            <a href={LINKEDIN_URL} target="_blank" className="text-sc-slate font-bold hover:text-text-dark transition-colors flex items-center gap-2 text-base">
                                <Linkedin size={20} /> LinkedIn Profile
                            </a>
                            <span className="text-sc-taupe/30">|</span>
                            <span className="text-text-dark/60 text-base">Powered by Gemini Deep Research</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
